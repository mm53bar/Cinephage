changelog:
  exclude:
    labels:
      - skip-changelog
      - no-release-notes
  categories:
    - title: 'Breaking Changes'
      labels:
        - breaking-change
        - major
    - title: 'Features'
      labels:
        - feature
        - enhancement
    - title: 'Bug Fixes'
      labels:
        - bug
        - bugfix
        - fix
    - title: 'Documentation'
      labels:
        - documentation
        - docs
    - title: 'Dependencies'
      labels:
        - dependencies
        - deps
        - javascript
        - npm
        - docker
        - security
    - title: 'Maintenance'
      labels:
        - chore
        - ci
        - refactor
