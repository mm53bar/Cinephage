# Build and push Docker images to GitHub Container Registry
#
# Triggers:
# - Pull requests to main: Build only (validates Dockerfile)
# - Push to main: Build and push with edge channel tags
# - Runs only when Docker-relevant files change (paths filter)
#
# Images are pushed to ghcr.io/<owner>/cinephage
#
# Uses native runners for each architecture to avoid slow QEMU emulation

name: Docker Build

on:
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/docker-build.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-entrypoint.sh'
      - 'docker-script-runner.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - 'server.js'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'src/**'
      - 'static/**'
      - 'data/**'
      - 'scripts/fix-tv-subtitle-paths.js'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/docker-build.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-entrypoint.sh'
      - 'docker-script-runner.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - 'server.js'
      - 'svelte.config.js'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'src/**'
      - 'static/**'
      - 'data/**'
      - 'scripts/fix-tv-subtitle-paths.js'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional custom tag for the multi-arch image (e.g., dev, rc1)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      run_date: ${{ steps.meta.outputs.run_date }}
      app_version: ${{ steps.meta.outputs.app_version }}
      arch_tag_amd64: ${{ steps.meta.outputs.arch_tag_amd64 }}
      arch_tag_arm64: ${{ steps.meta.outputs.arch_tag_arm64 }}

    steps:
      - name: Compute version and arch tags
        id: meta
        run: |
          RUN_DATE="$(date +%Y%m%d)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            APP_VERSION="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            APP_VERSION="dev-${RUN_DATE}-${{ github.run_number }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            APP_VERSION="edge-${RUN_DATE}-${{ github.run_number }}"
          else
            APP_VERSION="sha-${GITHUB_SHA::7}"
          fi

          {
            echo "run_date=${RUN_DATE}"
            echo "app_version=${APP_VERSION}"
            echo "arch_tag_amd64=${APP_VERSION}-amd64"
            echo "arch_tag_arm64=${APP_VERSION}-arm64"
          } >> "$GITHUB_OUTPUT"

  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test image
        run: docker buildx build --load -t cinephage:test --build-arg APP_VERSION=${{ needs.prepare.outputs.app_version }} .

      - name: Test Docker image
        run: |
          docker run -d --name cinephage-test \
            -p 3000:3000 \
            -e ORIGIN=http://localhost:3000 \
            cinephage:test

          for i in {1..12}; do
            if curl -sf http://localhost:3000/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for container... ($i/12)"
            sleep 5
          done

          echo "Health check failed"
          docker logs cinephage-test
          exit 1

      - name: Cleanup test container
        if: always()
        run: docker rm -f cinephage-test || true

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_amd64 }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.app_version }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          sbom: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_arm64 }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.app_version }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            type=raw,value=edge-${{ needs.prepare.outputs.run_date }}-${{ github.run_number }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev-${{ needs.prepare.outputs.run_date }}-${{ github.run_number }},enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
          labels: |
            org.opencontainers.image.title=Cinephage
            org.opencontainers.image.description=Self-hosted media management application

      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          AMD64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_amd64 }}
          ARM64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_arm64 }}
        run: |
          # Create manifest for each tag
          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" "$AMD64_IMAGE" "$ARM64_IMAGE"
          done
