# Documentation Site - Build & Deploy to Cloudflare Workers
#
# Deploys the Docusaurus documentation site to Cloudflare Workers
# when docs-site/ or docs/ content changes on main.

name: Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build documentation site
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-build
          path: docs-site/build
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Workers
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: docs-build
          path: docs-site/build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@da0e0a079a6acfbbbd1b4f4de80ecee2295d1e62 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs-site
          command: deploy
