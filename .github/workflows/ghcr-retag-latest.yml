name: GHCR Stable Latest Rollback

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Stable release tag to copy to latest (e.g., v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'
      dry_run:
        description: 'Preview only (no retag)'
        required: true
        type: boolean
        default: true
      confirm:
        description: 'Type RETAG to allow non-dry-run retag'
        required: true
        type: string
        default: 'NO'

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  retag-latest:
    name: Roll back latest to stable release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate confirmation
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -euo pipefail

          if [ "$DRY_RUN" != 'true' ] && [ "$CONFIRM" != 'RETAG' ]; then
            echo "Refusing retag: set confirm=RETAG when dry_run=false"
            exit 1
          fi

      - name: Set image references
        id: refs
        env:
          SOURCE_TAG_INPUT: ${{ github.event.inputs.source_tag }}
        run: |
          set -euo pipefail

          IMAGE_NAME_LC="${GITHUB_REPOSITORY,,}"
          SOURCE_TAG="$(echo "$SOURCE_TAG_INPUT" | xargs)"

          if [ -z "$SOURCE_TAG" ]; then
            echo "source_tag is required"
            exit 1
          fi

          # Normalize plain semver input (e.g. 1.0.0 -> v1.0.0) without touching channel tags.
          if [[ "$SOURCE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            SOURCE_TAG="v${SOURCE_TAG}"
          fi

          if [[ ! "$SOURCE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "source_tag must be a stable semver release tag (vX.Y.Z)."
            echo "Got: ${SOURCE_TAG}"
            exit 1
          fi

          SOURCE_IMAGE="ghcr.io/${IMAGE_NAME_LC}:${SOURCE_TAG}"
          LATEST_IMAGE="ghcr.io/${IMAGE_NAME_LC}:latest"

          {
            echo "source_tag=${SOURCE_TAG}"
            echo "source_image=${SOURCE_IMAGE}"
            echo "latest_image=${LATEST_IMAGE}"
          } >> "$GITHUB_OUTPUT"

          echo "Source image: ${SOURCE_IMAGE}"
          echo "Latest image: ${LATEST_IMAGE}"

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install crane
        env:
          CRANE_VERSION: v0.20.6
        run: |
          set -euo pipefail

          curl -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            -o /tmp/go-containerregistry.tgz

          tar -xzf /tmp/go-containerregistry.tgz -C /tmp crane
          sudo mv /tmp/crane /usr/local/bin/crane
          crane version

      - name: Verify source image exists
        env:
          SOURCE_IMAGE: ${{ steps.refs.outputs.source_image }}
        run: |
          set -euo pipefail

          docker buildx imagetools inspect "$SOURCE_IMAGE" >/dev/null
          echo "Verified source image exists: $SOURCE_IMAGE"

      - name: Validate stable release metadata
        env:
          SOURCE_IMAGE: ${{ steps.refs.outputs.source_image }}
          SOURCE_TAG: ${{ steps.refs.outputs.source_tag }}
        run: |
          set -euo pipefail

          SOURCE_CONFIG="$(crane config --platform linux/amd64 "$SOURCE_IMAGE")"
          VERSION_LABEL="$(echo "$SOURCE_CONFIG" | jq -r '.config.Labels["org.opencontainers.image.version"] // ""')"
          APP_INTERNAL_VERSION_ENV="$(echo "$SOURCE_CONFIG" | jq -r '.config.Env[]? | select(startswith("APP_VERSION="))' | tail -n 1 | sed 's/^APP_VERSION=//')"
          APP_VERSION_ENV="$(echo "$SOURCE_CONFIG" | jq -r '.config.Env[]? | select(startswith("PUBLIC_APP_VERSION="))' | tail -n 1 | sed 's/^PUBLIC_APP_VERSION=//')"
          CINEPHAGE_API_VERSION_ENV="$(echo "$SOURCE_CONFIG" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_VERSION="))' | tail -n 1 | sed 's/^CINEPHAGE_API_VERSION=//')"
          CINEPHAGE_API_COMMIT_ENV="$(echo "$SOURCE_CONFIG" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_COMMIT="))' | tail -n 1 | sed 's/^CINEPHAGE_API_COMMIT=//')"

          echo "Source tag: ${SOURCE_TAG}"
          echo "Version label: ${VERSION_LABEL:-<empty>}"
          echo "App version env: ${APP_INTERNAL_VERSION_ENV:-<empty>}"
          echo "Public app version env: ${APP_VERSION_ENV:-<empty>}"
          echo "Cinephage API version env: ${CINEPHAGE_API_VERSION_ENV:-<empty>}"
          echo "Cinephage API commit env: ${CINEPHAGE_API_COMMIT_ENV:-<empty>}"

          if [ "$VERSION_LABEL" != "$SOURCE_TAG" ]; then
            echo "Refusing retag: org.opencontainers.image.version must match ${SOURCE_TAG}."
            exit 1
          fi

          if [ "$APP_INTERNAL_VERSION_ENV" != "$SOURCE_TAG" ]; then
            echo "Refusing retag: APP_VERSION metadata must match ${SOURCE_TAG}."
            exit 1
          fi

          if [ "$APP_VERSION_ENV" != "$SOURCE_TAG" ]; then
            echo "Refusing retag: PUBLIC_APP_VERSION metadata must match ${SOURCE_TAG}."
            exit 1
          fi

          if [ -z "$CINEPHAGE_API_VERSION_ENV" ] || [ -z "$CINEPHAGE_API_COMMIT_ENV" ]; then
            echo 'Refusing retag: Cinephage API metadata is missing from the stable image.'
            exit 1
          fi

      - name: Sync Cinephage API current release for rollback
        if: github.event.inputs.dry_run != 'true'
        env:
          API_URL: https://api.cinephage.net
          AUTOMATION_KEY: ${{ secrets.CINEPHAGE_AUTOMATION_KEY }}
          SOURCE_IMAGE: ${{ steps.refs.outputs.source_image }}
        run: |
          set -euo pipefail

          SOURCE_CONFIG="$(crane config --platform linux/amd64 "$SOURCE_IMAGE")"
          CINEPHAGE_API_VERSION="$(echo "$SOURCE_CONFIG" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_VERSION="))' | tail -n 1 | sed 's/^CINEPHAGE_API_VERSION=//')"
          CINEPHAGE_API_COMMIT="$(echo "$SOURCE_CONFIG" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_COMMIT="))' | tail -n 1 | sed 's/^CINEPHAGE_API_COMMIT=//')"

          RESPONSE=$(curl -sS -X POST "${API_URL}/update/release" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${AUTOMATION_KEY}" \
            -d "{\"commit\":\"${CINEPHAGE_API_COMMIT}\",\"version\":\"${CINEPHAGE_API_VERSION}\"}")

          echo "$RESPONSE" | jq .

          if ! echo "$RESPONSE" | jq -e '.success == true' >/dev/null 2>&1; then
            echo '❌ Failed to sync Cinephage API during stable rollback'
            exit 1
          fi

      - name: Promote stable release to latest
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          SOURCE_TAG: ${{ steps.refs.outputs.source_tag }}
          SOURCE_IMAGE: ${{ steps.refs.outputs.source_image }}
          LATEST_IMAGE: ${{ steps.refs.outputs.latest_image }}
          VERIFY_RETRIES: '18'
          VERIFY_DELAY_SECONDS: '5'
          SUMMARY_HEADING: '## GHCR Stable Latest Rollback'
        run: |
          set -euo pipefail

          bash .github/scripts/promote-latest.sh
