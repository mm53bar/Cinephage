# Create versioned releases by promoting existing CI Docker images
#
# Triggers:
# - Manual workflow_dispatch from main only
#
# This workflow:
# 1. Promotes existing CI architecture tags into release tags
# 2. Creates GitHub release with generated notes and custom notes
# 3. Cleans up old untagged images from GHCR

name: Release

on:
  workflow_dispatch:
    branches:
      - main
    inputs:
      release_type:
        description: 'Version bump type for the next stable release'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: 'Custom version tag (required for release_type=custom, e.g., v1.0.0)'
        required: false
        type: string
        default: ''
      source_tag:
        description: 'CI candidate tag to promote (without -amd64/-arm64), e.g. main-20260306-123'
        required: true
        type: string
      release_notes:
        description: 'Additional release notes (optional)'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}
      api_version: ${{ steps.resolve-api-version.outputs.api_version }}
      is_prerelease: ${{ steps.release-mode.outputs.is_prerelease }}
      source_tag: ${{ steps.validate-source-tag.outputs.source_tag }}
      git_sha: ${{ steps.capture-git-sha.outputs.git_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: resolve-version
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          normalize_version() {
            local v="$1"
            if [[ "$v" != v* ]]; then
              v="v${v}"
            fi
            echo "$v"
          }

          parse_core_semver() {
            local tag="$1"
            if [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "${BASH_REMATCH[1]} ${BASH_REMATCH[2]} ${BASH_REMATCH[3]}"
              return 0
            fi
            return 1
          }

          LAST_STABLE_TAG=$(git tag -l --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [ -z "$LAST_STABLE_TAG" ]; then
            LAST_STABLE_TAG='v0.0.0'
          fi

          BASE_TAG="$LAST_STABLE_TAG"

          case "$RELEASE_TYPE" in
            custom)
              if [ -z "$INPUT_VERSION" ]; then
                echo "❌ release_type=custom requires version input"
                exit 1
              fi
              VERSION="$(normalize_version "$INPUT_VERSION")"
              ;;
            patch|minor|major)
              if [ -n "$INPUT_VERSION" ]; then
                echo "ℹ️ Ignoring version input because release_type=${RELEASE_TYPE}"
              fi

              if ! read -r MAJOR MINOR PATCH < <(parse_core_semver "$BASE_TAG"); then
                echo "❌ Could not parse auto-bump base tag: ${BASE_TAG}"
                echo "Use release_type=custom with an explicit version if needed."
                exit 1
              fi

              case "$RELEASE_TYPE" in
                patch)
                  PATCH=$((PATCH + 1))
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
              esac

              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
              ;;
            *)
              echo "❌ Unsupported release_type: ${RELEASE_TYPE}"
              exit 1
              ;;
          esac

          echo "Resolved release version: ${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "❌ Version must be semantic and v-prefixed (e.g., v1.0.0 or v1.0.0-rc.1)"
            exit 1
          fi

      - name: Resolve Cinephage API version
        id: resolve-api-version
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
        run: |
          set -euo pipefail

          API_VERSION="${VERSION#v}"
          if [ -z "$API_VERSION" ]; then
            echo "❌ Failed to derive Cinephage API version from ${VERSION}"
            exit 1
          fi

          echo "api_version=${API_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Cinephage API version: ${API_VERSION}"

      - name: Determine prerelease mode
        id: release-mode
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$REF_NAME" != 'main' ]; then
            echo "❌ Releases are only allowed from main. Got: ${REF_NAME}"
            exit 1
          fi

          IS_PRERELEASE='false'
          REASON='stable-main'

          if [[ "$VERSION" =~ -([Rr][Cc]|[Bb]eta|[Aa]lpha|[Pp]re|[Pp]review)([.-]?[0-9A-Za-z]*)?$ ]]; then
            IS_PRERELEASE='true'
            REASON='version-suffix'
          fi

          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Detected prerelease mode: ${IS_PRERELEASE} (${REASON})"

      - name: Capture release commit SHA
        id: capture-git-sha
        run: echo "git_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        env:
          VERSION: ${{ steps.resolve-version.outputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag $VERSION already exists!"
            exit 1
          fi
          echo "✅ Tag $VERSION is available"

      - name: Validate source candidate tag
        id: validate-source-tag
        env:
          SOURCE_TAG_INPUT: ${{ github.event.inputs.source_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          SOURCE_TAG="$(echo "$SOURCE_TAG_INPUT" | xargs)"

          if [ -z "$SOURCE_TAG" ]; then
            echo "❌ source_tag is required"
            exit 1
          fi

          if [[ "$SOURCE_TAG" == *-amd64 || "$SOURCE_TAG" == *-arm64 ]]; then
            echo "❌ source_tag must not include architecture suffix (-amd64/-arm64)"
            exit 1
          fi

          if [[ ! "$SOURCE_TAG" =~ ^main-[0-9]{8}-[0-9]+$ ]]; then
            echo "❌ Releases must promote an immutable main tag (main-YYYYMMDD-RUN)."
            echo "Got: ${SOURCE_TAG}"
            exit 1
          fi

          echo "source_tag=${SOURCE_TAG}" >> "$GITHUB_OUTPUT"
          echo "✅ Source candidate tag: ${SOURCE_TAG}"

  manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install crane
        env:
          CRANE_VERSION: v0.20.6
        run: |
          set -euo pipefail

          curl -fsSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            -o /tmp/go-containerregistry.tgz

          tar -xzf /tmp/go-containerregistry.tgz -C /tmp crane
          sudo mv /tmp/crane /usr/local/bin/crane
          crane version

      - name: Verify promoted source images exist
        env:
          SOURCE_TAG: ${{ needs.validate.outputs.source_tag }}
          SOURCE_AMD64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.source_tag }}-amd64
          SOURCE_ARM64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.source_tag }}-arm64
        run: |
          set -euo pipefail

          echo "Checking source candidate tags for ${SOURCE_TAG}..."
          docker buildx imagetools inspect "$SOURCE_AMD64_IMAGE" >/dev/null
          docker buildx imagetools inspect "$SOURCE_ARM64_IMAGE" >/dev/null
          echo "✅ Found ${SOURCE_AMD64_IMAGE} and ${SOURCE_ARM64_IMAGE}"

      - name: Promote source images to release tags with release metadata
        env:
          SOURCE_TAG: ${{ needs.validate.outputs.source_tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          CINEPHAGE_API_VERSION: ${{ needs.validate.outputs.api_version }}
          CINEPHAGE_API_COMMIT: ${{ needs.validate.outputs.git_sha }}
          IS_PRERELEASE: ${{ needs.validate.outputs.is_prerelease }}
          SOURCE_AMD64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.source_tag }}-amd64
          SOURCE_ARM64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.source_tag }}-arm64
          RELEASE_AMD64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.version }}-amd64
          RELEASE_ARM64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.version }}-arm64
          RELEASE_MULTIARCH_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          # Mutate immutable source architecture images into release tags without rebuild.
          # This writes release version metadata directly into the image config.
          crane mutate "$SOURCE_AMD64_IMAGE" \
            --platform linux/amd64 \
            --tag "$RELEASE_AMD64_IMAGE" \
            --env "APP_VERSION=$VERSION" \
            --env "CINEPHAGE_API_VERSION=$CINEPHAGE_API_VERSION" \
            --env "CINEPHAGE_API_COMMIT=$CINEPHAGE_API_COMMIT" \
            --label "org.opencontainers.image.version=$VERSION"

          crane mutate "$SOURCE_ARM64_IMAGE" \
            --platform linux/arm64 \
            --tag "$RELEASE_ARM64_IMAGE" \
            --env "APP_VERSION=$VERSION" \
            --env "CINEPHAGE_API_VERSION=$CINEPHAGE_API_VERSION" \
            --env "CINEPHAGE_API_COMMIT=$CINEPHAGE_API_COMMIT" \
            --label "org.opencontainers.image.version=$VERSION"

          # Confirm the runtime app version envs were written to promoted tags.
          AMD64_APP_VERSION_ENV=$(crane config --platform linux/amd64 "$RELEASE_AMD64_IMAGE" | jq -r '.config.Env[]? | select(startswith("APP_VERSION="))' | tail -n 1)
          ARM64_APP_VERSION_ENV=$(crane config --platform linux/arm64 "$RELEASE_ARM64_IMAGE" | jq -r '.config.Env[]? | select(startswith("APP_VERSION="))' | tail -n 1)
          AMD64_CINEPHAGE_VERSION_ENV=$(crane config --platform linux/amd64 "$RELEASE_AMD64_IMAGE" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_VERSION="))' | tail -n 1)
          ARM64_CINEPHAGE_VERSION_ENV=$(crane config --platform linux/arm64 "$RELEASE_ARM64_IMAGE" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_VERSION="))' | tail -n 1)
          AMD64_CINEPHAGE_COMMIT_ENV=$(crane config --platform linux/amd64 "$RELEASE_AMD64_IMAGE" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_COMMIT="))' | tail -n 1)
          ARM64_CINEPHAGE_COMMIT_ENV=$(crane config --platform linux/arm64 "$RELEASE_ARM64_IMAGE" | jq -r '.config.Env[]? | select(startswith("CINEPHAGE_API_COMMIT="))' | tail -n 1)
          echo "amd64 ${AMD64_APP_VERSION_ENV}"
          echo "arm64 ${ARM64_APP_VERSION_ENV}"
          echo "amd64 ${AMD64_CINEPHAGE_VERSION_ENV}"
          echo "arm64 ${ARM64_CINEPHAGE_VERSION_ENV}"
          echo "amd64 ${AMD64_CINEPHAGE_COMMIT_ENV}"
          echo "arm64 ${ARM64_CINEPHAGE_COMMIT_ENV}"

          if [ "$AMD64_APP_VERSION_ENV" != "APP_VERSION=$VERSION" ] || [ "$ARM64_APP_VERSION_ENV" != "APP_VERSION=$VERSION" ] || [ "$AMD64_CINEPHAGE_VERSION_ENV" != "CINEPHAGE_API_VERSION=$CINEPHAGE_API_VERSION" ] || [ "$ARM64_CINEPHAGE_VERSION_ENV" != "CINEPHAGE_API_VERSION=$CINEPHAGE_API_VERSION" ] || [ "$AMD64_CINEPHAGE_COMMIT_ENV" != "CINEPHAGE_API_COMMIT=$CINEPHAGE_API_COMMIT" ] || [ "$ARM64_CINEPHAGE_COMMIT_ENV" != "CINEPHAGE_API_COMMIT=$CINEPHAGE_API_COMMIT" ]; then
            echo "❌ Failed to set runtime version metadata on promoted images"
            exit 1
          fi

          # Build release manifest from the release architecture tags.
          docker buildx imagetools create -t "$RELEASE_MULTIARCH_IMAGE" "$RELEASE_AMD64_IMAGE" "$RELEASE_ARM64_IMAGE"
          RELEASE_DIGEST="$(docker buildx imagetools inspect "$RELEASE_MULTIARCH_IMAGE" | awk '/^Digest:/ {print $2; exit}')"

          if [ -z "$RELEASE_DIGEST" ]; then
            echo "❌ Failed to resolve digest for ${RELEASE_MULTIARCH_IMAGE}"
            exit 1
          fi

          # Tag as latest only for stable releases.
          if [ "$IS_PRERELEASE" != 'true' ]; then
            crane tag "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}@${RELEASE_DIGEST}" latest
            LATEST_DIGEST="$(docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest" | awk '/^Digest:/ {print $2; exit}')"

            if [ "$LATEST_DIGEST" != "$RELEASE_DIGEST" ]; then
              echo "❌ latest digest does not match release digest"
              echo "release=${RELEASE_DIGEST}"
              echo "latest=${LATEST_DIGEST}"
              exit 1
            fi

            echo "✅ Promoted ${SOURCE_TAG} to ${VERSION} and latest"
          else
            echo "✅ Promoted ${SOURCE_TAG} to ${VERSION} (latest skipped for prerelease)"
          fi

      - name: Sync stable release with Cinephage API
        env:
          API_URL: https://api.cinephage.net
          AUTOMATION_KEY: ${{ secrets.CINEPHAGE_AUTOMATION_KEY }}
          CINEPHAGE_API_VERSION: ${{ needs.validate.outputs.api_version }}
          CINEPHAGE_API_COMMIT: ${{ needs.validate.outputs.git_sha }}
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST "${API_URL}/update/release" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${AUTOMATION_KEY}" \
            -d "{\"commit\":\"${CINEPHAGE_API_COMMIT}\",\"version\":\"${CINEPHAGE_API_VERSION}\"}")

          echo "$RESPONSE" | jq .

          if ! echo "$RESPONSE" | jq -e '.success == true' >/dev/null 2>&1; then
            echo '❌ Failed to sync stable release with Cinephage API'
            exit 1
          fi

          HEALTH=$(curl -sS "${API_URL}/api/health")
          echo "$HEALTH" | jq .

          if ! echo "$HEALTH" | jq -e --arg version "$CINEPHAGE_API_VERSION" '.version == $version' >/dev/null 2>&1; then
            echo "❌ Cinephage API health version did not match ${CINEPHAGE_API_VERSION}"
            exit 1
          fi

      - name: Get manifest digest
        id: digest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.validate.outputs.version }}
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest.Digest}}' | xargs)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, manifest]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create Git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          # Create and push tag
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "⚠️  Tag already exists, skipping tag creation"
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "✅ Created and pushed tag $VERSION"
          fi

      - name: Build release notes body
        id: notes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          SOURCE_TAG: ${{ needs.validate.outputs.source_tag }}
          EXTRA_NOTES: ${{ github.event.inputs.release_notes }}
          RELEASE_GIT_SHA: ${{ needs.validate.outputs.git_sha }}
        with:
          script: |
            const version = process.env.VERSION;
            const sourceTag = process.env.SOURCE_TAG;
            const extraNotes = (process.env.EXTRA_NOTES || '').trim();
            const releaseSha = process.env.RELEASE_GIT_SHA;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const imageRef = `ghcr.io/${owner.toLowerCase()}/${repo.toLowerCase()}:${version}`;
            const hiddenAuthorPattern = /@github-actions\[bot\]/i;
            const contributorBotPattern = /@(github-actions\[bot\]|dependabot\[bot\]|renovate\[bot\])/i;

            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });
            const releaseCount = releases.data.filter((r) => !r.draft).length;
            const isFirstRelease = releaseCount === 0;

            const generated = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: version,
              target_commitish: context.ref.replace('refs/heads/', ''),
              configuration_file_path: '.github/release.yml'
            });

            let generatedBody = generated.data.body || '';
            generatedBody = generatedBody
              .split('\n')
              .filter((line) => !hiddenAuthorPattern.test(line))
              .join('\n');

            // Remove bot entries from "New Contributors" only.
            generatedBody = generatedBody.replace(
              /(^##+\s+New Contributors\s*$[\s\S]*?)(?=^##+\s+|$)/m,
              (section) => {
                const lines = section.split('\n').filter((line) => !contributorBotPattern.test(line));
                const hasContributorBullet = lines.some((line) => /^[-*]\s+@/.test(line.trim()));
                return hasContributorBullet ? `${lines.join('\n').trim()}\n\n` : '';
              }
            );
            generatedBody = generatedBody.replace(/\n{3,}/g, '\n\n').trim();

            const preface = [];
            preface.push(`Promoted from CI candidate: \`${sourceTag}\``);
            preface.push(`Container image: \`${imageRef}\``);
            preface.push(`Release commit: \`${releaseSha}\``);

            if (isFirstRelease) {
              preface.push('');
              preface.push('## Initial Release');
              preface.push('- First official Cinephage release.');
              preface.push('- Multi-arch images published for `linux/amd64` and `linux/arm64`.');
              preface.push('- Pin deployments to this version tag for stable rollouts.');
            }

            if (extraNotes.length > 0) {
              preface.push('');
              preface.push('## Maintainer Notes');
              preface.push(extraNotes);
            }

            const body = `${preface.join('\n')}\n\n---\n\n${generatedBody}`.trim();
            core.setOutput('body', body);

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          BODY: ${{ steps.notes.outputs.body }}
          IS_PRERELEASE: ${{ needs.validate.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          declare -a prerelease_args=()
          if [ "$IS_PRERELEASE" = 'true' ]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "$BODY" \
            --verify-tag \
            "${prerelease_args[@]}"

  cleanup-images:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: [manifest]
    if: success()
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Cleanup untagged images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ env.IMAGE_NAME_LC }}
        run: |
          echo "🧹 Cleaning up old untagged images..."

          # Get package versions using GitHub API
          API_RESPONSE=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/user/packages/container/${PACKAGE_NAME}/versions")

          # Check if API call was successful
          if echo "$API_RESPONSE" | jq -e '.message' > /dev/null 2>&1; then
            echo "⚠️  API Error: $(echo "$API_RESPONSE" | jq -r '.message')"
            echo "Skipping cleanup..."
            exit 0
          fi

          # Get untagged versions (versions with no tags)
          UNTAGGED_VERSIONS=$(echo "$API_RESPONSE" | jq -r '.[] | select(.metadata.container.tags | length == 0) | .id' | sort -rn)

          if [ -z "$UNTAGGED_VERSIONS" ]; then
            echo "✅ No untagged images found to clean up"
            exit 0
          fi

          # Count untagged versions
          COUNT=$(echo "$UNTAGGED_VERSIONS" | grep -c . || echo "0")
          echo "Found ${COUNT} untagged image version(s)"

          # Keep the last 5 untagged versions for safety, delete the rest
          TO_DELETE=$(echo "$UNTAGGED_VERSIONS" | tail -n +6)

          if [ -z "$TO_DELETE" ]; then
            echo "✅ All untagged images are within the safety threshold (keeping last 5)"
            exit 0
          fi

          DELETE_COUNT=$(echo "$TO_DELETE" | grep -c . || echo "0")
          echo "Deleting ${DELETE_COUNT} old untagged version(s) (keeping last 5)..."

          # Delete untagged versions
          echo "$TO_DELETE" | while read -r version_id; do
            if [ -n "$version_id" ] && [ "$version_id" != "null" ]; then
              echo "  Deleting version: ${version_id}"
              DELETE_RESPONSE=$(curl -s -w "\n%{http_code}" -X DELETE \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                "https://api.github.com/user/packages/container/${PACKAGE_NAME}/versions/${version_id}")
              
              HTTP_CODE=$(echo "$DELETE_RESPONSE" | tail -n 1)
              if [ "$HTTP_CODE" = "204" ]; then
                echo "    ✅ Deleted successfully"
              else
                echo "    ⚠️  Failed to delete (HTTP ${HTTP_CODE})"
              fi
            fi
          done

          echo "✅ Cleanup complete"
