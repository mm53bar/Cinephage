---
# Cinephage Library Streaming Indexer
# This internal indexer queries the local library database to provide
# streaming URLs for content in your library.
#
# Quality is determined at playback time by the streaming proxy,
# which extracts streams from providers and selects the best available quality.

id: cinephage-stream
name: Cinephage Library
description: Stream content from your local media library via .strm files
type: private
protocol: streaming
language: en-US
encoding: UTF-8

links:
  - http://localhost

settings:
  - name: useHttps
    type: checkbox
    label: Use HTTPS
    default: false
    helpText: 'Enable if your server uses SSL/HTTPS'

  - name: externalHost
    type: text
    label: External Host
    default: ''
    placeholder: '192.168.1.100:3000'
    helpText: 'External hostname and port for streaming access. Example: 192.168.1.100:3000 or media.example.com'

  - name: cinephageApiBaseUrl
    type: text
    label: Cinephage API Base URL
    default: 'https://api.cinephage.net'
    placeholder: 'https://api.cinephage.net'
    helpText: 'Upstream API used to resolve streams. Leave as production unless you are testing another deployment.'

  - name: cinephageCommit
    type: text
    label: Cinephage API Commit
    default: ''
    placeholder: 'abc123def'
    helpText: 'Build commit sent with authenticated requests to the Cinephage API.'

  - name: cinephageVersion
    type: text
    label: Cinephage API Version
    default: ''
    placeholder: '2.3.3'
    helpText: 'Build version sent with authenticated requests to the Cinephage API.'

# Protocol-specific configuration for streaming
protocolConfig:
  streaming:
    type: internal
    dataSource: database

# Search capabilities
caps:
  modes:
    search: [q]
    movie-search: [q, tmdbid, imdbid]
    tv-search: [q, tmdbid, tvdbid, imdbid, season, ep]
  categories:
    '2000': Movies
    '5000': TV
  categorymappings:
    - id: Movies
      cat: '2000'
      desc: Movies
      default: true
    - id: TV
      cat: '5000'
      desc: TV Shows
      default: true

# Search configuration (uses DatabaseQueryExecutor defaults)
# The executor handles movie/TV queries against the local database
search:
  response:
    type: json
