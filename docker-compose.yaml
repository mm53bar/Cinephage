# =============================================================================
# Cinephage Docker Compose
# =============================================================================
# Official image: ghcr.io/moldytaint/cinephage:latest
# Optional: set IMAGE_TAG to pin a specific image tag
# To build from source instead of pulling the image:
#   Uncomment "build: ." and comment out "image:" below
#
# Configuration: Copy .env.example to .env and configure your values there.
# All environment variables are read from .env via the env_file directive.
# =============================================================================

services:
  cinephage:
    image: ghcr.io/moldytaint/cinephage:${IMAGE_TAG:-latest}
    # build: .  # Uncomment to build locally (requires cloning the repo)
    container_name: cinephage
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - '3000:3000'
    env_file: .env
    volumes:
      - ./config:/config
      - /path/to/media:/media
      - /path/to/downloads:/downloads
